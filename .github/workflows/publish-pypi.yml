name: Publish to PyPI

# Publishes `zablo-cli` to PyPI when a tag of the form `vX.Y.Z` is pushed.
#
# Uses PyPI Trusted Publishing (OIDC, no long-lived API tokens needed):
#   https://docs.pypi.org/trusted-publishers/
# Configure once at https://pypi.org/manage/account/publishing/ with:
#   * PyPI project: zablo
#   * Owner: <your github org/user>
#   * Repo:  zablo
#   * Workflow: publish-pypi.yml
#   * Environment: pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - run: python -m pytest -q

  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/p/zablo
    permissions:
      id-token: write   # required for PyPI Trusted Publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Check dist metadata
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
